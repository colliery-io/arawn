name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.93
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Cargo check
        run: cargo check --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.93
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace -- --test-threads=1

      - name: Run integration tests (ignored)
        run: cargo test --workspace -- --ignored --test-threads=1

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          components: llvm-tools-preview

      - name: Install Rust nightly (for branch coverage)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate line coverage (stable, workspace)
        run: |
          cargo llvm-cov --workspace --no-report -- --test-threads=1
          cargo llvm-cov report --workspace --html --output-dir coverage/
          cargo llvm-cov report --workspace --lcov --output-path coverage/lcov.info
          cargo llvm-cov report --workspace

      - name: Generate branch coverage (nightly, per-crate)
        run: |
          for crate_dir in crates/*/; do
            crate=$(basename "$crate_dir")
            if [ -f "$crate_dir/Cargo.toml" ]; then
              cargo +nightly llvm-cov -p "$crate" --branch --lcov \
                --output-path "coverage/branch-${crate}.info" 2>/dev/null \
                && cat "coverage/branch-${crate}.info" >> coverage/branch-combined.info \
                && echo "$crate: OK" \
                || echo "$crate: SKIPPED"
            fi
          done

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.93
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release
